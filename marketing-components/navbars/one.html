<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <style>
        *{
            padding: 0%;
            margin: 0%;
            box-sizing: border-box;
            text-decoration: none;
            border: none;
            background: none;
            font-family: "Roboto", sans-serif;
            font-style: normal;
        }

        header {
            width: 100%;
            height: 72px;

            display: flex;
            padding: 0 64px;
            justify-content: space-between;
            align-items: center;
        }

        header > image {
            width: 80px;
            height: 40px;
        }
        
        .header-nav {
            display: flex;
            gap: 32px;
            align-items: center;
        }
        nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 32px;
        }
        a {
            font-size: 16px;
            font-weight: 400;
            color: black;
        }

        nav > button {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 4px;
        }

        button > p {
            font-size: 16px;
            font-weight: 400;
            color: black;
        }

        .btn-wrapper{
            display: flex;
            gap: 16px;
        
        }

        .btn-wrapper > button {
        padding: 8px 20px;
        border: 1px solid black;
        }

        .btn-secondery {
            background-color: black;
            color: white;
        }


    </style>
</head>
<body>
    <header>
        <img src="./assets/images/company-logo.svg" alt="image logo company">
        <div class="header-nav">
            <nav>
                <a href="">Link One</a>
                <a href="">Link Two</a>
                <a href="">Link Three</a>
                <button>
                    <p>Link Four</p>
                    <img src="./assets/images/chevron-down.svg" alt="image chevron down">
                </button>
            </nav>
            <div class="btn-wrapper">
                <button>button</button>
                 <button
                 class="btn-secondery">button</button>
            </div>
        </div>
    </header>
    
</body>
</html>
